<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div id="page-bg"></div>

  <header class="site-header">
    <span class="site-logo" role="link" tabindex="0" id="home-logo"></span>
    <nav id="breadcrumb" aria-label="breadcrumb"></nav>
  </header>

  <main id="app"></main>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button id="lb-close" aria-label="Close lightbox">&times;</button>
    <button id="lb-prev"  aria-label="Previous photo">&#8249;</button>
    <div    id="lb-stage">
      <div  id="lb-img" role="img" aria-label="Photo"></div>
    </div>
    <button id="lb-next"  aria-label="Next photo">&#8250;</button>
    <div    id="lb-counter"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
